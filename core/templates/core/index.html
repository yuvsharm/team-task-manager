<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Team Task Manager</h1>

<div id="loginSection">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<div id="appSection" style="display:none;">

    <button onclick="logout()">Logout</button>

    <h2>Create Project</h2>
    <form id="projectForm">
        <input type="text" id="name" placeholder="Project Name"><br><br>
        <input type="text" id="desc" placeholder="Description"><br><br>
        <button type="submit">Create Project</button>
    </form>

    <h2>Projects</h2>
    <ul id="projectList"></ul>

    <hr>

    <h2>Create Task</h2>
    <form id="taskForm">
        <input type="text" id="title" placeholder="Task Title"><br><br>
        <select id="projectId"></select><br><br>
        <button type="submit">Create Task</button>
    </form>

    <h2>Tasks</h2>
    <ul id="taskList"></ul>

</div>

<script>
let token = localStorage.getItem("token");

if (token) {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";
    loadProjects();
    loadTasks();
} else {
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("appSection").style.display = "none";
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
        localStorage.setItem("token", data.access);
        alert("Login successful");
        location.reload();
    } else {
        alert("Invalid credentials");
    }
}

function logout() {
    localStorage.removeItem("token");
    alert("Logged out!");
    location.reload();
}

async function loadProjects() {
    const res = await fetch("/api/projects/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (res.status === 401) {
        alert("Session expired, please login again");
        logout();
        return;
    }

    const data = await res.json();

    const dropdown = document.getElementById("projectId");
    dropdown.innerHTML = "";

    data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.id;
        option.text = `${p.name} (ID: ${p.id})`;
        dropdown.appendChild(option);
    });

    // 🔹 PROJECT LIST
    const list = document.getElementById("projectList");
    list.innerHTML = "";

    data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = `ID: ${p.id} | ${p.name} - ${p.description}`;
        list.appendChild(li);
    });
}

async function loadTasks() {
    const res = await fetch("/api/tasks/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (res.status === 401) {
        alert("Session expired, please login again");
        logout();
        return;
    }

    const data = await res.json();
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    data.forEach(t => {
        const li = document.createElement("li");
        li.innerText = `Task: ${t.title} | Status: ${t.status} | Project: ${t.project}`;
        list.appendChild(li);
    });
}

document.getElementById("projectForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/api/projects/", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            description: document.getElementById("desc").value
        })
    });

    if (res.status === 201) {
        alert("Project Created!");
        loadProjects();
    } else {
        alert("Error creating project");
    }
};

document.getElementById("taskForm").onsubmit = async (e) => {
    e.preventDefault();

    const projectId = parseInt(document.getElementById("projectId").value);

    const res = await fetch("/api/tasks/", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: document.getElementById("title").value,
            description: "From UI",

            status: "todo",

            project: projectId,

            assigned_to: 1,

            due_date: new Date().toISOString() 
        })
    });

    if (res.status === 201) {
        alert("Task Created!");
        loadTasks();
    } else {
        alert("Error creating task");
    }
};
</script>

</body>
</html>
